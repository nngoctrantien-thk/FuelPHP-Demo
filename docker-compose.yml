version: '3.8'

services:
  app:
    build: .
    container_name: fuelphp_app
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: fuelphp_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: fuelphp
      MYSQL_USER: fueluser
      MYSQL_PASSWORD: fuelpass
    ports:
      - "3306:3309"
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: fuelphp_pma
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
    depends_on:
      - db

volumes:
  db_data:

networks:
  default:
    ipam:
      config:
        - subnet: 172.25.0.0/16